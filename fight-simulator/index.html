<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculateur de Jets de Dés</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    
    <select id="tabSelect" class="tab-select">
      <option value="perso">🎲 Personnages</option>
      <option value="ennemi">👹 Ennemis</option>
      <option value="chasse">🏹 Chasse</option>
      <option value="crochetage">🔑 Crochetage</option>
      <option value="craft">🛠️ Artisanat</option>
      <option value="stats">📊 Stats</option>
    </select>

    <!-- Onglets -->
    <div class="tabs">
      <button class="tab-button active" data-tab="perso">🎲 <br>Personnages</button>
      <button class="tab-button" data-tab="ennemi">👹 <br>Ennemis</button>
      <button class="tab-button" data-tab="chasse">🏹 <br>Chasse</button>
      <button class="tab-button" data-tab="crochetage">🔑 <br>Crochetage</button>
      <button class="tab-button" data-tab="craft">🛠️ <br>Artisanat</button>
      <button class="tab-button" data-tab="stats">📊 <br>Stats</button>
    </div>

    <!-- Onglet Personnages -->
    <div id="tab-perso" class="tab-content active">
      <div class="card">
        <h2>Attaque d'un personnage</h2>
        <label for="personnage">Personnage :</label>
        <select id="personnage">
          <option value="brakmar">Brakmar</option>
          <option value="draner">Drânër</option>
        </select>

        <label for="bonusContext">Bonus/Malus contextuel :</label>
        <input type="number" id="bonusContext" value="0" />

        <label for="arme">Arme / Test :</label>
        <select id="arme">
          <optgroup label="Armes de corps à corps">
            <option value="1d10" data-type="cac">Marteau de guerre (1d10)</option>
            <option value="1d8-1" data-type="cac">Rapière (1d8-1)</option>
            <option value="1d6" data-type="cac">Épée courte (1d6)</option>
            <option value="1d8" data-type="cac">Épée longue (1d8)</option>
            <option value="2d10" data-type="cac">Coup puissant (2d10)</option>
          </optgroup>
          <optgroup label="Armes à distance">
            <option value="1d6" data-type="distance">Arc court (1d6)</option>
            <option value="1d8" data-type="distance">Arc long (1d8)</option>
            <option value="1d10" data-type="distance">Arbalète (1d10)</option>
          </optgroup>
          <optgroup label="Tests">
            <option value="1d20" data-type="test" data-stat="for">Force</option>
            <option value="1d20" data-type="test" data-stat="agi">Agilité</option>
            <option value="1d20" data-type="test" data-stat="int">Intelligence</option>
            <option value="1d20" data-type="test" data-stat="end">Endurance</option>
            <option value="1d20" data-type="test" data-stat="cha">Charisme</option>
          </optgroup>
          <optgroup label="Combattre la mort">
            <option value="1d20" data-type="test" data-stat="death">Combattre la mort</option>
            <option value="1d6" data-type="test" data-stat="pv">PV résurrection</option>
          </optgroup>
        </select>

        <label for="reduceDamage">Réduction des dégâts :</label>
        <input type="number" id="reduceDamage" value="0" min="0" max="10" />

        <label for="seuilToucher">Seuil de réussite :</label>
        <input type="number" id="seuilToucher" value="10" min="1" max="20" />

        <button onclick="attaquePerso()">Lancer l'attaque</button>

        <div id="resultat"></div>
        <div id="resume"></div>
        <button id="copyPJBtn" style="display:none;">📋 Copier</button>

      </div>
    </div>

    <!-- Onglet Ennemis -->
    <div id="tab-ennemi" class="tab-content">
      <div class="card">
        <h2>Attaque d'un PNJ</h2>

        <label for="nomPNJ">Nom du PNJ :</label>
        <input type="text" id="nomPNJ" placeholder="ex : Barbare sanguinaire">

        <label for="attackTypePNJSelect">Type d'attaque :</label>
        <select id="attackTypePNJSelect">
          <option value="cac">Corps à corps</option>
          <option value="distance">À distance</option>
        </select>

        <div id="ctPNJContainer" style="display: none;">
          <label for="ctPNJ">Capacité de tir (CT) :</label>
          <input type="number" id="ctPNJ" min="0" max="10" value="3">
        </div>

        <label for="attaquePNJ">Nom de l'attaque :</label>
        <input type="text" id="attaquePNJ" placeholder="ex : Épée rouillée">

        <label for="degatsPNJ">Dégâts (ex: 2d6+1) :</label>
        <input type="text" id="degatsPNJ" placeholder="2d6+1">

        <label for="damageTypePNJSelect">Type de dégâts</label>
        <select id="damageTypePNJSelect">
          <option value="physique">Physique</option>
          <option value="magique">Magique</option>
        </select>

        <label for="ciblePNJ">Cible :</label>
        <select id="ciblePNJ">
          <option value="brakmar">Brakmar</option>
          <option value="draner">Drânër</option>
        </select>

        <button onclick="attaquePNJ()">Lancer l'attaque</button>

        <div id="resultatPNJ"></div>
        <button id="copyPNJBtn" style="display:none;">📋 Copier</button>
      </div>
    </div>


  <!-- Onglet Chasse -->
  <div id="tab-chasse" class="tab-content">
    <div class="card">
    <h2>Chasse</h2>

    <select id="nomChasseur">
       <option value="brakmar">Brakmar</option>
       <option value="draner">Drânër</option>
    </select>

    <label for="pvActuels">PV actuels :</label>
    <input type="number" id="pvActuels" value="20" min="1"><br>


    <label>Zone :</label>
    <select id="zoneChasse">
        <option value="ville">Ville</option>
        <option value="foret">Forêt</option>
        <option value="marais">Marais</option>
        <option value="montagne">Montagne</option>
        <option value="plaine">Plaine</option>
    </select>

    <label>Durée (heures) :</label>
    <input type="number" id="tempsChasse" value="5" min="1" max="12">

    <label>Méthode :</label>
    <select id="methodeChasse">
        <option value="brutale">Brutale </option>
        <option value="discrete">Discrète</option>
    </select>

    <label for="prioriteChasse">Priorité :</label>
    <select id="prioriteChasse">
      <option value="aucune">Aucune</option>
      <option value="viande">Viande (+1 viande, -1 ressource)</option>
      <option value="ressource">Ressource (+1 ressource, -1 viande)</option>
      <option value="compagnon">Compagnon (tente apprivoisement si possible)</option>
    </select><br>

    <button id="toggleBonusBtn" type="button" class="mini-btn">Voir plus ▼</button>

    <div id="bonusContainer" style="display:none; margin-top:10px;">
        <label>Bonus Pistage :</label>
        <input type="number" id="bonusPistage" value="0"><br>

        <label>Bonus Chasse :</label>
        <input type="number" id="bonusChasse" value="0"><br>

        <label>Bonus Apprivoiser :</label>
        <input type="number" id="bonusApprivoiser" value="0"><br>

        <label>Bonus Loot :</label>
        <input type="number" id="bonusLoot" value="0"><br>
    </div>

    <button onclick="lancerChasse()">Lancer la chasse</button>

    <div id="resultatChasse" style="margin-top:20px; white-space:pre-line; border:1px solid #ccc; padding:10px;">
    Résultats de la chasse ici...
    </div>
    <button id="copyChasseBtn" style="display:none;">📋 Copier</button>
  </div> 
</div>

    <!-- Onglet Crochetage -->
  <div id="tab-crochetage" class="tab-content">
    <div class="card">
      <h2>Crochetage</h2>

      <label for="outilCrochetage">Matériel :</label>
      <select id="outilCrochetage" onchange="document.getElementById('durabiliteCrochetage').value = outilsCrochetage[this.value].durabilite;">
        <option value="1">Niveau 1 - Rudimentaire</option>
        <option value="2">Niveau 2 - Standard</option>
        <option value="3">Niveau 3 - Avancé</option>
        <option value="4">Niveau 4 - Maître</option>
      </select><br>

      <label for="durabiliteCrochetage">Durabilité :</label>
      <input type="number" id="durabiliteCrochetage" value="5" min="0"><br>

      <label for="serrureCrochetage">Serrure :</label>
      <select id="serrureCrochetage">
        <option value="10">Facile (DD 10)</option>
        <option value="15">Modérée (DD 15)</option>
        <option value="20">Difficile (DD 20)</option>
        <option value="25">Très difficile (DD 25)</option>
      </select><br><br>

      <button onclick="lancerCrochetage()">🎲 Tenter le crochetage</button>

      <div id="resultatCrochetage" style="margin-top:20px; white-space:pre-line; border:1px solid #ccc; padding:10px;">
        Résultats du crochetage ici...
      </div>

      <button id="copyCrochetageBtn" style="display:none;">📋 Copier</button>
    </div>
  </div>

  <!-- Onglet Métiers -->
  <div id="tab-craft" class="tab-content">
    <div class="card">
      <h2>Artisanat</h2>

      <label>Nom de l'objet :</label>
        <input type="text" id="nomObjet" placeholder="Ex : Potion de soin">

        <label>Type :</label>
        <select id="typeCraft">
          <option value="forge">Forge</option>
          <option value="cuisine">Cuisine</option>
          <option value="alchimie">Alchimie (pas d’assistant)</option>
        </select>

        <label>Niveau métier :</label>
        <input type="number" id="niveauMetier" value="1" min="0">

        <label>Quantité à produire :</label>
        <input type="number" id="quantiteCraft" value="1" min="1">

        <label>Ingrédients par création :</label>
        <input type="number" id="nbIngredients" value="1" min="1">

        <label>Outil :</label>
        <select id="outilCraft">
          <option value="0">Basique (+0)</option>
          <option value="1">Amélioré (+1)</option>
          <option value="2">Maître (+2)</option>
        </select>

        <label>Durabilité outil :</label>
        <input type="number" id="durabiliteCraft" value="10" min="0">

        <label>Assistant :</label>
        <select id="assistantCraft">
          <option value="none">Seul</option>
          <option value="apprenti">Apprenti</option>
          <option value="maitre">Maître</option>
        </select>

        <button onclick="lancerCraft()">🎲 Lancer la production</button>

        <div id="resultatCraft" style="margin-top:20px; white-space:pre-line; border:1px solid #ccc; padding:10px;">
          Résultat ici...
        </div>
      <button id="copyCraftBtn" style="display:none;">📋 Copier</button>
    </div>
  </div>
  <div id="tab-stats" class="tab-content">
    <div class="card">
      <h2>Stats du personnage</h2>

      <label for="personnageStats">Personnage :</label>
      <select id="personnageStats">
        <option value="brakmar">Brakmar</option>
        <option value="draner">Drânër</option>
      </select>

      <div id="statsPerso"></div>
    </div>
  </div>

    <!-- Historique partagé -->
    <h3 id="historicTitle">Historique des lancers</h3>
    <div id="historique"></div>

  </div>
  <script src="script.js"></script>
</body>
</html>
